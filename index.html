<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo List</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app">
    <header>
      <h1>Todo List</h1>
      <p id="empty-state" class="empty-state" aria-live="polite">No todos yet. Add one below! 💡</p>
    </header>

    <form id="todo-form">
      <label for="todo-input" class="sr-only">Add a new todo</label>
      <input
        id="todo-input"
        type="text"
        placeholder="What needs to be done?"
        autocomplete="off"
        maxlength="100"
      >
      <button type="submit">Add Todo</button>
    </form>

    <ul id="todo-list" aria-live="polite"></ul>
  </main>

  <script src="app.js"></script>
</body>
</html>
